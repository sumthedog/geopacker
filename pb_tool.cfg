[Plugin]
name: Geopacker
version: 1.0.0
qgis_minimum_version: 3.0
description: Bundles an entire QGIS project (.qgz) into an easily shareable, single compressed file. Consolidates vectors into a GeoPackage, gathers rasters, and fixes layer paths.
about: A tool to package layers for sharing by eliminating broken paths. Includes options to strip duplicates and empty temporary layers.
author: Frederick Cuario
email: rrcuario@gmail.com
repository: https://github.com/qwe/geopacker
tracker: https://github.com/qwe/geopacker/issues

[Files]
python_files: __init__.py geopacker.py geopacker_dialog.py packaging_logic.py
ui_files: geopacker_dialog_base.ui
resource_files: resources.qrc
extras: metadata.txt icon.png LICENSE README.md

[Help]
dir: help

[Translations]
dir: i18n
